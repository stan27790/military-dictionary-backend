<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Название сайта, которое будет видно в поиске -->
    <title>Military Dictionary | Военный словарь (каз-рус-англ)</title>
    
    <!-- Краткое описание для Google -->
    <meta name="description" content="Онлайн-словарь военных терминов на трех языках: казахском, русском и английском. Удобный поиск и точная терминология." />
    
    <!-- Ключевые слова (через запятую) -->
    <meta name="keywords" content="военный словарь, әскери сөздік, military dictionary, перевод военных терминов, Казахстан, Алматы" />
    
    <!-- Чтобы в мессенджерах (WhatsApp, Telegram) ссылка выглядела красиво -->
    <meta property="og:title" content="Trilingual Military Dictionary" />
    <meta property="og:description" content="Словарь военных терминов: казахский, русский, английский языки." />
    <meta property="og:type" content="website" />
  </head>
  <body>
    <div id="root"></div>
    <!-- Убедись, что путь к main.jsx правильный, обычно в Vite это /src/main.jsx -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
